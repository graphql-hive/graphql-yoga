name: Snapshot Release
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  noop-for-bots:
    if:
      github.actor == 'dependabot[bot]' || github.actor == 'copilot-swe-agent[bot]' || github.actor
      == 'github-copilot[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping snapshot release jobs for bot actor."

  alpha:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: the-guild-org/shared-config/.github/workflows/release-snapshot.yml@v1
    if:
      github.actor != 'dependabot[bot]' && github.actor != 'copilot-swe-agent[bot]' && github.actor
      != 'github-copilot[bot]' && (github.event_name == 'push' || (github.event_name ==
      'pull_request' && github.event.pull_request.title != 'Upcoming Release Changes'))
    with:
      npmTag: alpha
      buildScript: build
      node-version-file: .node-version
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}

  release-candidate:
    uses: the-guild-org/shared-config/.github/workflows/release-snapshot.yml@v1
    if:
      github.event_name == 'pull_request' && github.event.pull_request.title == 'Upcoming Release
      Changes' && github.actor != 'dependabot[bot]' && github.actor != 'copilot-swe-agent[bot]' &&
      github.actor != 'github-copilot[bot]'
    with:
      npmTag: rc
      restoreDeletedChangesets: false
      buildScript: build
      node-version-file: .node-version
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}

  dependencies:
    uses: the-guild-org/shared-config/.github/workflows/changesets-dependencies.yml@v1
    if:
      github.actor != 'dependabot[bot]' && github.actor != 'copilot-swe-agent[bot]' && github.actor
      != 'github-copilot[bot]' && (github.event_name == 'push' || (github.event_name ==
      'pull_request' && github.event.pull_request.title != 'Upcoming Release Changes'))
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
    with:
      installDependencies: true
      node-version-file: .node-version
